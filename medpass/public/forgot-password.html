<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — MedPass</title>



<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400;1,600&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<canvas id="bgCanvas" aria-hidden="true"></canvas>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-mark">MED<span>PASS</span></div>
      <div class="brand-tag">AI Tutor</div>
    </div>
    <div class="vitals">
      <canvas id="vitalsCanvas"></canvas>
      <span class="vitals-readout">SESSION&nbsp;MONITOR</span>
      <span class="vitals-status" id="vitalsStatus">STANDBY</span>
    </div>
    <div id="banner" class="banner" role="alert"></div>
    <p class="helper-text">Enter the email on your account and we'll send a link to reset your password.</p>
    <form id="forgotForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="you@school.edu" required>
      </div>
      <button type="submit" class="btn-primary" id="submitBtn">Send reset link</button>
    </form>
    <div class="dev-link-box" id="devLinkBox">
      <span class="dev-label">Dev mode — no SMTP configured</span>
      <a id="devLinkAnchor" href="#"></a>
    </div>
    <div class="links-row">
      <a href="/login.html">Back to sign in</a>
      <a href="/signup.html">Create account</a>
    </div>
  </div>
</div>
<script src="/auth.js"></script>
<script src="/forgot-password-init.js"></script>
</body>
</html>

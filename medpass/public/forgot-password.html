<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password — MedPass</title>
  <link rel="stylesheet" href="/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">MED<span>PASS</span></div>
    </div>
    <div class="auth-card">
      <a href="/login.html" class="back-link">← Back to sign in</a>
      <div id="alert" class="alert"></div>
      <h1 class="auth-title">Forgot your password?</h1>
      <p class="auth-subtitle">Enter your email and we'll send a reset link.</p>
      <form id="forgotForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@university.edu" autocomplete="email" required/>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Send reset link →</button>
      </form>
      <div id="devBanner" class="dev-banner"></div>
    </div>
  </div>
  <script src="/auth.js"></script>
  <script>
    document.getElementById('forgotForm').onsubmit = async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const res = await api('/api/auth/forgot-password', { email: document.getElementById('email').value });
        showAlert(res.message || 'Reset link sent.', 'success');
        if (res.devResetLink) {
          const b = document.getElementById('devBanner');
          b.innerHTML = '🔧 Dev mode — <a href="' + res.devResetLink + '">click here to reset</a>';
          b.classList.add('show');
        }
      } catch (err) { showAlert(err.message || 'Error.', 'error'); }
      btn.disabled = false; btn.textContent = 'Send reset link →';
    };
  </script>
</body>
</html>

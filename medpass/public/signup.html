<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Create Account — MedPass</title>
  <link rel="stylesheet" href="/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">MED<span>PASS</span></div>
      <div class="auth-logo-sub">AI Study Platform</div>
    </div>
    <div class="auth-card">
      <div id="alert" class="alert"></div>
      <h1 class="auth-title">Create your account.</h1>
      <p class="auth-subtitle">Start your AI-powered board prep today.</p>
      <form id="signupForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@university.edu" autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input class="form-input" id="password" type="password" placeholder="Min. 8 chars, 1 letter + 1 number" autocomplete="new-password" required/>
            <button type="button" class="input-toggle" id="pwToggle" aria-label="Show password">👁</button>
          </div>
          <div class="pw-strength" id="pwStrength">
            <div class="pw-seg" id="s1"></div>
            <div class="pw-seg" id="s2"></div>
            <div class="pw-seg" id="s3"></div>
          </div>
          <div class="form-hint" id="pwHint">8+ characters, at least one letter and one number.</div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Create account →</button>
      </form>
      <div class="auth-link">Already have an account? <a href="/login.html">Sign in</a></div>
    </div>
  </div>
  <script src="/auth.js"></script>
  <script>
    document.getElementById('pwToggle').onclick = function() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    };

    document.getElementById('password').oninput = function() {
      const pw = this.value;
      const hasLen = pw.length >= 8;
      const hasLetter = /[a-zA-Z]/.test(pw);
      const hasNum = /[0-9]/.test(pw);
      const strength = (hasLen ? 1 : 0) + (hasLetter ? 1 : 0) + (hasNum ? 1 : 0);
      const cls = strength === 3 ? 'strong' : strength === 2 ? 'medium' : pw.length ? 'weak' : '';
      ['s1','s2','s3'].forEach((id, i) => {
        const el = document.getElementById(id);
        el.className = 'pw-seg' + (i < strength && cls ? ' ' + cls : '');
      });
    };

    document.getElementById('signupForm').onsubmit = async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Creating account…';
      try {
        const res = await api('/api/auth/signup', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        if (res.success) { location.href = '/app.html'; return; }
        showAlert(res.error || 'Signup failed.', 'error');
      } catch (err) { showAlert(err.message || 'Network error.', 'error'); }
      btn.disabled = false; btn.textContent = 'Create account →';
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sign In — MedPass</title>
  <link rel="stylesheet" href="/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">MED<span>PASS</span></div>
      <div class="auth-logo-sub">AI Study Platform</div>
    </div>
    <div class="auth-card">
      <div id="alert" class="alert"></div>
      <h1 class="auth-title">Welcome back.</h1>
      <p class="auth-subtitle">Sign in to continue your board prep journey.</p>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@university.edu" autocomplete="email" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrap">
            <input class="form-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="input-toggle" id="pwToggle" aria-label="Show password">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Sign in →</button>
      </form>
      <div class="auth-link"><a href="/forgot-password.html">Forgot your password?</a></div>
      <div class="auth-link">New to MedPass? <a href="/signup.html">Create account</a></div>
    </div>
  </div>
  <script src="/auth.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('verified')) showAlert('Email verified — sign in below.', 'success');
    if (params.get('verify_error')) showAlert(params.get('verify_error'), 'error');

    document.getElementById('pwToggle').onclick = function() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    };

    document.getElementById('loginForm').onsubmit = async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res = await api('/api/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        });
        if (res.success) { location.href = '/app.html'; return; }
        showAlert(res.error || 'Sign in failed.', 'error');
      } catch (err) { showAlert(err.message || 'Network error.', 'error'); }
      btn.disabled = false; btn.textContent = 'Sign in →';
    };
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Set New Password — MedPass</title>
  <link rel="stylesheet" href="/auth.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-mark">MED<span>PASS</span></div>
    </div>
    <div class="auth-card">
      <div id="alert" class="alert"></div>
      <h1 class="auth-title">Set a new password.</h1>
      <p class="auth-subtitle">Choose a strong password for your account.</p>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <div class="input-wrap">
            <input class="form-input" id="password" type="password" placeholder="Min. 8 chars, 1 letter + 1 number" autocomplete="new-password" required/>
            <button type="button" class="input-toggle" id="pwToggle">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="submitBtn">Update password →</button>
      </form>
    </div>
  </div>
  <script src="/auth.js"></script>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) { showAlert('Invalid or missing reset token.', 'error'); document.getElementById('submitBtn').disabled = true; }

    document.getElementById('pwToggle').onclick = function() {
      const inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
      this.textContent = inp.type === 'password' ? '👁' : '🙈';
    };

    document.getElementById('resetForm').onsubmit = async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Updating…';
      try {
        const res = await api('/api/auth/reset-password', { token, password: document.getElementById('password').value });
        if (res.success) { showAlert('Password updated! Redirecting…', 'success'); setTimeout(() => location.href = '/login.html', 2000); return; }
        showAlert(res.error || 'Reset failed.', 'error');
      } catch (err) { showAlert(err.message || 'Error.', 'error'); }
      btn.disabled = false; btn.textContent = 'Update password →';
    };
  </script>
</body>
</html>

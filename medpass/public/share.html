<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Notes — MedPass</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #006fd6;
      --text: #1a1d23;
      --text-faint: #8a8fa8;
      --border: #e2e6f0;
      --bg: #f7f8fc;
      --card: #ffffff;
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      text-decoration: none;
      color: var(--text);
    }
    .brand-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--blue); display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .brand-name { font-weight: 700; font-size: 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 720px;
    }
    .doc-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .doc-meta {
      font-size: 13px;
      color: var(--text-faint);
      margin-bottom: 20px;
    }
    .doc-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }
    .tag-chip {
      background: #eef4ff;
      color: var(--blue);
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .doc-content {
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      border-top: 1px solid var(--border);
      padding-top: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .error-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-faint);
    }
    .error-msg h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-faint);
      text-align: center;
    }
    .footer a { color: var(--blue); text-decoration: none; }
    .loading { text-align: center; padding: 80px 20px; color: var(--text-faint); font-style: italic; }
  </style>
</head>
<body>
  <a class="brand" href="/">
    <div class="brand-mark">🩺</div>
    <span class="brand-name">MedPass</span>
  </a>

  <div class="card" id="content">
    <div class="loading">Loading shared notes…</div>
  </div>

  <div class="footer">
    Shared with <a href="/">MedPass</a> — AI study assistant for medical students
  </div>

  <script>
    (async function() {
      const token = (window.location.pathname.match(/\/share\/([a-f0-9]{32})/) || [])[1]
        || new URLSearchParams(window.location.search).get('t');
      const card = document.getElementById('content');

      if (!token) {
        card.innerHTML = '<div class="error-msg"><h2>Invalid Link</h2><p>This share link is not valid.</p></div>';
        return;
      }

      try {
        const res = await fetch('/api/share/' + token);
        if (!res.ok) throw new Error('not found');
        const { document: doc } = await res.json();
        const tags = (doc.tags || '').split(',').map(t => t.trim()).filter(Boolean);
        card.innerHTML = `
          <div class="doc-name">${escHtml(doc.name)}</div>
          <div class="doc-meta">Shared via MedPass &middot; ${doc.doc_type || 'document'}</div>
          ${tags.length ? `<div class="doc-tags">${tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>` : ''}
          <div class="doc-content">${escHtml(doc.text_content)}</div>
        `;
        document.title = doc.name + ' — MedPass';
      } catch {
        card.innerHTML = '<div class="error-msg"><h2>Link Not Found</h2><p>This share link may have been revoked or has expired.</p></div>';
      }
    })();

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
